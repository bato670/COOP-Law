<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة التدريب التعاوني الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1e8;
  --card:#fff;
  --text:#1b1b1b;
  --muted:#666;
  --p:#7c3aed;
  --shadow:0 10px 30px rgba(124,58,237,.12);
  --r:16px;
}

body.dark{
  --bg:#0b0614;
  --card:#141021;
  --text:#fff;
  --muted:#b8a9d6;
}

*{font-family:Tajawal;box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* HEADER */
header{
  position:fixed;top:0;right:0;left:0;
  background:var(--card);
  box-shadow:var(--shadow);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.logo{
  color:var(--p);
  font-weight:900;
}

/* LAYOUT */
.container{
  margin-top:90px;
  max-width:1000px;
  margin-inline:auto;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:18px;
  border-radius:var(--r);
  box-shadow:var(--shadow);
  margin-bottom:15px;
}

/* TEXTAREA */
textarea{
  width:100%;
  min-height:120px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
}

/* BUTTON */
button{
  background:var(--p);
  color:#fff;
  border:0;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  margin:3px;
}

/* FILE */
input[type=file]{
  margin-top:10px;
}

/* RESULT */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin:4px 0;
  background:rgba(124,58,237,.1);
  color:var(--p);
}

.score{
  font-size:22px;
  font-weight:900;
  color:var(--p);
}

small{color:var(--muted)}
</style>
</head>

<body>

<header>
  <div class="logo">منصة التدريب الذكية</div>
  <div>
    <button onclick="toggle()">الوضع</button>
    <button onclick="save()">حفظ</button>
  </div>
</header>

<div class="container">

<!-- WEEK 1 -->
<div class="card">
  <h2>الأسبوع 1</h2>
  <textarea id="w1"></textarea>
  <input type="file" id="f1" multiple>
</div>

<!-- WEEK 2 -->
<div class="card">
  <h2>الأسبوع 2</h2>
  <textarea id="w2"></textarea>
  <input type="file" id="f2" multiple>
</div>

<!-- WEEK 3 -->
<div class="card">
  <h2>الأسبوع 3</h2>
  <textarea id="w3"></textarea>
  <input type="file" id="f3" multiple>
</div>

<!-- CV -->
<div class="card">
  <h2>السيرة الذاتية</h2>
  <input type="file" id="cv">
</div>

<!-- AI -->
<div class="card">
  <h2>🧠 المساعد الذكي</h2>
  <button onclick="analyze()">تحليل الكتابة</button>
  <div id="result" style="margin-top:10px"></div>
</div>

</div>

<script>

/* ================= LOAD ================= */
window.onload=()=>{
  ["w1","w2","w3"].forEach(id=>{
    let v=localStorage.getItem(id);
    if(v) document.getElementById(id).value=v;
  });
};

/* ================= SAVE ================= */
function save(){
  ["w1","w2","w3"].forEach(id=>{
    localStorage.setItem(id,document.getElementById(id).value);
  });

  alert("تم الحفظ");
}

/* ================= DARK MODE ================= */
function toggle(){
  document.body.classList.toggle("dark");
}

/* ================= AI ANALYSIS ================= */

function analyze(){

  let text =
  (document.getElementById("w1").value + " " +
   document.getElementById("w2").value + " " +
   document.getElementById("w3").value).trim();

  let box=document.getElementById("result");

  if(!text){
    box.innerHTML="⚠️ لا يوجد محتوى";
    return;
  }

  let words=text.split(/\s+/).length;

  let score=formalScore(text);
  let clarity=clarityScore(text);
  let rep=repetition(text);

  box.innerHTML=`
    <div class="score">📊 التقييم: ${score}/100</div>

    <div class="badge">عدد الكلمات: ${words}</div>
    <div class="badge">الوضوح: ${clarity}%</div>
    <div class="badge">التكرار: ${rep}</div>

    <hr>

    <h3>💡 ملاحظات:</h3>
    <ul>
      ${score<60?'<li>الأسلوب يحتاج طابع رسمي أكثر</li>':''}
      ${clarity<60?'<li>الجمل تحتاج وضوح أكثر</li>':''}
    </ul>

    <h3>✨ إعادة صياغة:</h3>
    <p>${rewrite(text)}</p>
  `;
}

/* ================= RULE ENGINE ================= */

function formalScore(t){
  let s=50;
  if(t.includes("تحليل"))s+=20;
  if(t.includes("نظام"))s+=15;
  if(t.length>200)s+=10;
  return Math.min(100,s);
}

function clarityScore(t){
  return Math.min(100,Math.round((1/(t.split(" ").length/12))*100));
}

function repetition(t){
  let w=t.split(/\s+/),f={};
  w.forEach(x=>f[x]=(f[x]||0)+1);
  return Math.max(...Object.values(f))>6?"مرتفع":"طبيعي";
}

/* ================= REWRITE ================= */

function rewrite(t){
  return "تم خلال فترة التدريب اكتساب خبرات عملية في بيئة عمل احترافية، شملت التحليل النظامي، وفهم الإجراءات، وتطوير المهارات التطبيقية، مما عزز الكفاءة المهنية وصقل مهارات اتخاذ القرار.";
}

</script>

</body>
</html>
