<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التقرير التفاعلي للتدريب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --bg:#f6f1e8;
  --card:#ffffff;
  --text:#1b1b1b;
  --muted:#666;
  --p:#7c3aed;
  --shadow:0 10px 30px rgba(124,58,237,.12);
  --r:16px;
}

body.dark{
  --bg:#0b0614;
  --card:#141021;
  --text:#fff;
  --muted:#b8a9d6;
}

*{font-family:Tajawal;box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
}

/* HEADER */
header{
  position:fixed;top:0;right:0;left:0;
  background:var(--card);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:var(--shadow);
  z-index:10;
}

.logo{color:var(--p);font-weight:900}

button{
  background:var(--p);
  border:0;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  margin:0 4px;
}

/* LAYOUT */
.container{
  margin-top:90px;
  padding:20px;
  max-width:1000px;
  margin-inline:auto;
}

/* CARD */
.card{
  background:var(--card);
  padding:18px;
  border-radius:var(--r);
  box-shadow:var(--shadow);
  margin-bottom:15px;
}

/* TEXTAREA */
textarea{
  width:100%;
  min-height:120px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-family:inherit;
  outline:none;
}

/* FILES */
.files{
  margin-top:10px;
}

.file-item{
  padding:8px;
  margin:5px 0;
  border-radius:10px;
  background:rgba(124,58,237,.08);
  border:1px solid rgba(124,58,237,.2);
  font-size:13px;
}

/* QR */
#qr{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

/* INPUT FILE */
input[type=file]{
  margin-top:10px;
}

/* SMALL TEXT */
small{color:var(--muted)}
</style>
</head>

<body>

<header>
  <div class="logo">التقرير التفاعلي</div>

  <div>
    <button onclick="toggle()">الوضع</button>
    <button onclick="saveData()">حفظ</button>
    <button onclick="exportPDF()">PDF</button>
  </div>
</header>

<div class="container">

<!-- WEEK 1 -->
<div class="card">
  <h2>الأسبوع 1</h2>
  <textarea id="w1" placeholder="اكتب ما تدربت عليه..."></textarea>
  <input type="file" id="file_w1" multiple onchange="handleFiles('w1')">
  <div id="files_w1" class="files"></div>
</div>

<!-- WEEK 2 -->
<div class="card">
  <h2>الأسبوع 2</h2>
  <textarea id="w2"></textarea>
  <input type="file" id="file_w2" multiple onchange="handleFiles('w2')">
  <div id="files_w2" class="files"></div>
</div>

<!-- WEEK 3 -->
<div class="card">
  <h2>الأسبوع 3</h2>
  <textarea id="w3"></textarea>
  <input type="file" id="file_w3" multiple onchange="handleFiles('w3')">
  <div id="files_w3" class="files"></div>
</div>

<!-- TASKS -->
<div class="card">
  <h2>المهام</h2>
  <textarea id="tasks"></textarea>
</div>

<!-- CONTACT -->
<div class="card">
  <h2>التواصل</h2>
  <textarea id="contact" placeholder="LinkedIn - Email - GitHub"></textarea>
</div>

<!-- QR -->
<div class="card">
  <h2>باركود التقرير</h2>
  <div id="qr"></div>
  <small>يتحدث تلقائيًا بعد الحفظ</small>
</div>

</div>

<script>

/* ================= LOAD ================= */
window.onload=()=>{
  ["w1","w2","w3","tasks","contact"].forEach(id=>{
    let v = localStorage.getItem(id);
    if(v) document.getElementById(id).value=v;
  });

  ["w1","w2","w3"].forEach(renderFiles);

  generateQR();
};

/* ================= SAVE ================= */
function saveData(){
  ["w1","w2","w3","tasks","contact"].forEach(id=>{
    localStorage.setItem(id,document.getElementById(id).value);
  });

  generateQR();
  alert("تم الحفظ");
}

/* ================= FILES ================= */
function handleFiles(week){
  const input=document.getElementById("file_"+week);
  let files=[];

  Array.from(input.files).forEach(f=>{
    files.push({name:f.name});
  });

  localStorage.setItem("files_"+week,JSON.stringify(files));
  renderFiles(week);
}

function renderFiles(week){
  const box=document.getElementById("files_"+week);
  box.innerHTML="";

  let data=JSON.parse(localStorage.getItem("files_"+week)||"[]");

  data.forEach(f=>{
    let div=document.createElement("div");
    div.className="file-item";
    div.innerText="📎 "+f.name;
    box.appendChild(div);
  });
}

/* ================= QR ================= */
function generateQR(){
  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:location.href,
    width:140,
    height:140
  });
}

/* ================= PDF ================= */
function exportPDF(){
  html2pdf().from(document.querySelector(".container")).save("report.pdf");
}

/* ================= MODE ================= */
function toggle(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
